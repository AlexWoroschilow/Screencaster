<!DOCTYPE html>
<html>
<body>
    <h2>WebRTC Screencast</h2>
    <button onclick="start('broadcaster')">Start Broadcasting</button>
    <button onclick="start('viewer')">View Stream</button>
    <br><br>
    <video id="video" autoplay playsinline style="width: 80%; border: 1px solid black;"></video>

    <script>
        const pc = new RTCPeerConnection();

        pc.ontrack = (event) => {
            document.getElementById('video').srcObject = event.streams[0];
        };

        async function start(role) {
            if (role === 'broadcaster') {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { frameRate: 60 }
                });
                stream.getTracks().forEach(track => pc.addTrack(track, stream));
            } else {
                pc.addTransceiver('video', { direction: 'recvonly' });
            }

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            const response = await fetch('/offer', {
                method: 'POST',
                body: JSON.stringify({ sdp: pc.localDescription.sdp, type: pc.localDescription.type, role: role }),
                headers: { 'Content-Type': 'application/json' }
            });

            const answer = await response.json();
            await pc.setRemoteDescription(new RTCSessionDescription(answer));
        }
    </script>
</body>
</html>
