<!DOCTYPE html>
<html>
<body>
<h2>WebRTC Screencast Admin</h2>
<p>Broadcasting screen...</p>
<video id="video" autoplay playsinline style="width: 100%; height:auto;"></video>

<script>
    const pc = new RTCPeerConnection();

    async function start() {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({
                video: {frameRate: 30}
            });
            document.getElementById('video').srcObject = stream;
            stream.getTracks().forEach(track => pc.addTrack(track, stream));

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            const response = await fetch('http://localhost:8080/offer', {
                method: 'POST',
                body: JSON.stringify({
                    sdp: pc.localDescription.sdp,
                    type: pc.localDescription.type,
                    role: 'broadcaster'
                }),
                headers: {'Content-Type': 'application/json'}
            });

            const answer = await response.json();
            await pc.setRemoteDescription(new RTCSessionDescription(answer));
        } catch (err) {
            console.error("Error starting screencast:", err);
        }
    }

    // Auto-start broadcasting when the page loads
    window.onload = start;
</script>
</body>
</html>
